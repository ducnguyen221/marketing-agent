## enums.yml — bộ giá trị hợp lệ dùng chung cho mọi instance
## Mọi cột có `enum:` trong model.yml đều trỏ về đây. validate_calendar.py đọc file này.
version: 1
updated: 2026-07-21

format:
  description: Định dạng asset. Một asset = một định dạng, không gộp.
  values:
    long_video:   { label: "Video dài (hero)", platform_default: youtube,  hashtag_max: 3 }
    short:        { label: "Short / Reel dọc",  platform_default: youtube,  hashtag_max: 6 }
    fb_post:      { label: "Bài Facebook",      platform_default: facebook, hashtag_min: 6, hashtag_max: 13 }
    fb_reel:      { label: "Reel Facebook",     platform_default: facebook, hashtag_max: 6 }
    yt_community: { label: "YouTube Community post", platform_default: youtube, hashtag_max: 3 }
    blog:         { label: "Bài blog dài",      platform_default: website }
    newsletter:   { label: "Số newsletter",     platform_default: newsletter }

platform:
  values: [youtube, facebook, website, newsletter]

## 7 tầng funnel theo 51.01 §3.1 — thứ tự có nghĩa, dùng để sắp trục dashboard
funnel_stage:
  values:
    - discovery      # được tìm thấy: impressions, shorts shown in feed
    - packaging      # CTR, viewed vs swiped away
    - consumption    # AVD, average % viewed, watch time
    - engagement     # likes/comments/shares/poll votes trên view
    - conversion     # subscribers gained — NORTH STAR
    - retention      # returning viewers, playlist progression
    - business       # qualified leads, course sign-ups

## Máy trạng thái asset. Chuyển trạng thái hợp lệ khai ở transitions.
status:
  values: [idea, drafted, need_review, approved, scheduled, published, measured, archived, rejected]
  transitions:
    idea:        [drafted, archived]
    drafted:     [need_review, archived]
    need_review: [approved, rejected, drafted]      # rejected/drafted = trả về sửa
    approved:    [scheduled, need_review]
    scheduled:   [published, approved]
    published:   [measured]
    measured:    [archived]
    rejected:    [drafted, archived]
    archived:    []
  publish_requires: approved   # KHÔNG có approved thì publish adapter từ chối chạy

cta_type:
  values: [subscribe, like, comment, poll_vote, link_click, register, download, contact, none]
  commercial: [register, download, contact]   # dùng để enforce luật "CTA thương mại chỉ ở tập #3"

## Quyết định sau 28 ngày — 51.01 §12.7
decision_28d:
  values: [SCALE, ITERATE, REPURPOSE, EVERGREEN, STOP]

## Trạng thái duyệt dùng trong học liệu MKA-101 (tiếng Việt/khoá học) —
## ánh xạ sang `status` ở crosswalk.yml
approval_status_course:
  values: [Draft, Need Review, Approved, Need Revision, Rejected]

## 7 nguồn lead bắt buộc của buổi S05
lead_source:
  values: [app, hotline, form, social_inbox, website, branch, qr_event]

lead_segment:
  values: [hot, warm, nurture, low_priority]

## Mức tự trị (OpcOS core.md) — đọc từ instance.yml, adapter publish kiểm trước khi chạy
autonomy:
  values:
    suggest:   { label: "Chỉ đọc + đề xuất",           can_write_draft: false, can_publish: false }
    auto_safe: { label: "Tự làm phần an toàn",         can_write_draft: true,  can_publish: false }
    full:      { label: "Toàn quyền kể cả đăng thật",  can_write_draft: true,  can_publish: true  }
  default: suggest
