## workbook_spec.yml — đặc tả file Excel quản lý MỘT chiến dịch (5 sheet)
##
## Mô hình chuẩn KPIM Academy: mỗi campaign = 1 folder + 1 file `.md` (hồ sơ) + 1 file
## `.xlsx` (dữ liệu thực thi, 5 sheet). Hai file song hành, cùng tên folder.
##
## build_workbook.py đọc file này để dựng workbook. Cột lấy y hệt PIPELINE_CONTRACT của
## KPIM — KHÔNG thêm bớt. Ba cổng duyệt (approve_topic/content/final) là CỘT trong sheet
## Post, không phải sheet riêng.
version: 4
updated: 2026-07-23
source: "KPIM Academy 30_MARKETING/agent — PIPELINE_CONTRACT v3, 01_Tobi_Posts.xlsx"

conventions:
  file_name: "{campaign_code}.xlsx"        # đặt tên GIỐNG folder campaign
  header_row: 1
  freeze: "A2"
  header_style: plain_text                 # tiêu đề cột là text thuần, khớp tên field
  approve_truthy: [x, X, "TRUE", "✓", "1"] # đánh dấu đã duyệt
  na_policy: "Ô rỗng = chưa có / chưa biết. Không điền 0, không đoán."

## Máy trạng thái của Post (PIPELINE_CONTRACT §EXCEL)
post_status: [proposed, drafted, media_ready, atlas_ready, published]

## Luật cổng — CLI `campaign_excel.py list --stage` chỉ trả post đủ điều kiện.
## Người KHÔNG tick thì stage sau không có việc. Agent không tự tick thay người.
stages:
  topics:  { produces: "chủ đề → Sheet Post", from_status: [], to_status: proposed, gate: null }
  draft:   { requires: "approve_topic",   from_status: [proposed],                  to_status: drafted,     gate: approve_topic }
  media:   { requires: "approve_content", from_status: [drafted],                   to_status: media_ready, gate: approve_content }
  atlas:   { requires: null,              from_status: [media_ready],               to_status: atlas_ready, gate: null }
  publish: { requires: "approve_final",   from_status: [atlas_ready, media_ready],  to_status: published,   gate: approve_final }

sheets:

  # ──────────────────────────────────────────────────────────────────────────
  - name: "Campaign"
    kind: form                 # FORM DỌC key→value, KHÔNG phải bảng
    columns: ["field", "value", "chú thích / gợi ý điền"]
    purpose: Metadata nghiệp vụ của chiến dịch. Đổ từ campaign_meta.json khi tạo.
    fields:
      - [campaign_id,         "Mã định danh duy nhất, vd CMP-2026-06-AI"]
      - [campaign_code,       "Mã ngắn = TÊN FOLDER, vd 01_Tobi_Posts"]
      - [name,                "Tên chiến dịch dễ đọc"]
      - [pillar,              "Trụ nội dung: Power BI | Fabric | AI Agent | Career"]
      - [status,              "proposed → active → paused → done"]
      - [owner,               "Người phụ trách"]
      - [created,             "Ngày tạo YYYY-MM-DD (tự điền nếu trống)"]
      - [objective,           "Mục tiêu nghiệp vụ chính của chiến dịch"]
      - [description,         "Mô tả ngắn chiến dịch"]
      - [target_audience,     "Đối tượng mục tiêu"]
      - [key_message,         "Thông điệp cốt lõi xuyên suốt"]
      - [channels,            "Kênh phân phối: Facebook, YouTube, Atlas blog"]
      - [cadence,             "Nhịp đăng, vd 2 bài/tuần"]
      - [schedule_start,      "Ngày bắt đầu YYYY-MM-DD"]
      - [schedule_end,        "Ngày kết thúc YYYY-MM-DD"]
      - [num_posts_planned,   "Số bài dự kiến (số)"]
      - [kpi_targets,         "Chỉ tiêu KPI, vd reach 50k, 200 lead"]
      - [prompt_requirements, "Yêu cầu/giọng văn cho AI sinh nội dung"]
      - [ai_summary,          "Tóm tắt AI cập nhật theo thời gian (AI ghi)"]
      - [notes,               "Ghi chú khác"]

  # ──────────────────────────────────────────────────────────────────────────
  - name: "Post"
    kind: table
    key: post_id
    purpose: >
      Bảng chủ — một dòng một bài. Ba cổng duyệt approve_topic / approve_content /
      approve_final nằm ngay đây. status chạy proposed → drafted → media_ready →
      atlas_ready → published.
    columns:
      - post_id
      - campaign_id
      - topic_title
      - angle
      - pillar
      - topic_group          # 01_powerbi | 02_fabric | 03_ai-agent | 04_career
      - slug
      - detail_prompt
      - schedule_date
      - approve_topic        # CỔNG 1 — người tick → cho phép draft
      - content_md           # đường dẫn content.md (nguồn đa kênh)
      - blog_md
      - fb_post
      - youtube_desc
      - fb_desc
      - approve_content      # CỔNG 2 — người tick → cho phép media
      - make_short           # x → dựng thêm video-short; luôn hỏi xác nhận
      - infographic_png
      - audio_mp3
      - video_mp4
      - atlas_html
      - approve_final        # CỔNG 3 — người tick → cho phép publish
      - status
      - folder_path          # thư mục asset của bài
      - notes

  # ──────────────────────────────────────────────────────────────────────────
  - name: "Result"
    kind: table
    key: post_id
    purpose: Kết quả đăng tải — URL và ID trên từng nền tảng. Ghi ở stage publish.
    columns: [post_id, blog_url, youtube_url, fb_post_id, fb_permalink,
              fb_scheduled_at, published_at, status]

  # ──────────────────────────────────────────────────────────────────────────
  - name: "Engagement"
    kind: table
    key: post_id
    purpose: >
      Số liệu tương tác kéo về từ nền tảng (Facebook Graph / YouTube). Đây là dữ liệu
      DUY NHẤT đến từ ngoài file — nạp bằng scan_engagement (API) hoặc từ file export.
      Nối về bài qua fb_post_id.
    columns: [post_id, fb_post_id, fb_permalink, likes, comments, reactions,
              shares, reach, impressions, fetched_at]

  # ──────────────────────────────────────────────────────────────────────────
  - name: "Assets"
    kind: table
    key: [post_id, rel_path]
    purpose: Sổ tài liệu — mọi file thật của bài, đường dẫn tương đối trong folder bài.
    columns: [post_id, asset_type, rel_path, abs_path, size, created]
