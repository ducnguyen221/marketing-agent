## campaign-types.yml — khuôn chiến dịch dựng sẵn
##
## `new_campaign.py` đọc file này, bung `asset_pattern` theo số chu kỳ rồi sinh
## `calendar.csv` + workbook. Agent KHÔNG tự nghĩ ra nhịp đăng — chọn khuôn ở đây,
## rồi mới tinh chỉnh theo bối cảnh.
##
## `offset_days` tính từ ngày bắt đầu mỗi chu kỳ. `function_role` là vai trò chống lặp:
## hai asset cùng vai trò trong một chu kỳ = một cái thừa.
version: 1
updated: 2026-07-21

types:

  # ────────────────────────────────────────────────────────────────────────
  series:
    name: "Series nhiều tập"
    when: >
      Có một chủ đề đủ lớn để chia thành nhiều tập, mỗi tập tự đứng được nhưng nối
      thành mạch. Mục tiêu chính là subscriber chất lượng và người quay lại.
    duration_days: 28
    cycle_days: 7
    cycles: 4
    hero_format: long_video
    default_primary_kpi: subs_per_1000_engaged_views
    default_secondary_kpi: returning_viewers
    default_guardrail_kpi: retention_30s
    commercial_cta_cycles: [3]        # chỉ tập 3 được có CTA thương mại
    notes: >
      Hero đặt giữa tuần (offset 3 = Thứ Năm nếu chu kỳ bắt đầu Thứ Hai) để đón lượt xem
      cuối tuần. Số tập đặt ở CUỐI title. Mọi asset trong chu kỳ trỏ về hero của chu kỳ đó.
    asset_pattern:
      - { offset_days: 0, format: fb_post,      platform: facebook, funnel_stage: discovery,  function_role: mo_van_de,        cta_type: comment }
      - { offset_days: 1, format: yt_community, platform: youtube,  funnel_stage: engagement, function_role: demand_poll,      cta_type: poll_vote }
      - { offset_days: 2, format: short,        platform: youtube,  funnel_stage: discovery,  function_role: hook_mo_van_de,   cta_type: subscribe, distribution_platforms: "youtube;facebook" }
      - { offset_days: 3, format: long_video,   platform: youtube,  funnel_stage: conversion, function_role: chung_minh,       cta_type: subscribe, is_hero: true }
      - { offset_days: 4, format: fb_post,      platform: facebook, funnel_stage: engagement, function_role: giai_thich,       cta_type: comment }
      - { offset_days: 5, format: short,        platform: youtube,  funnel_stage: retention,  function_role: chuyen_doi,       cta_type: subscribe, distribution_platforms: "youtube;facebook" }
      - { offset_days: 6, format: fb_post,      platform: facebook, funnel_stage: engagement, function_role: recap_doi_thoai,  cta_type: comment }

  # ────────────────────────────────────────────────────────────────────────
  product_launch:
    name: "Ra mắt sản phẩm"
    when: >
      Có sản phẩm/dịch vụ mới cần giới thiệu ra thị trường trong một quý. Mục tiêu là
      reach + đăng ký/lead, không phải subscriber.
    duration_days: 84
    cycle_days: 7
    cycles: 12
    hero_format: fb_post
    default_primary_kpi: leads
    default_secondary_kpi: cta_rate
    default_guardrail_kpi: engagement_rate
    commercial_cta_cycles: all        # loại này bán hàng là hợp lệ, nhưng vẫn phải khai
    notes: >
      Nhịp thưa hơn series: 1–2 asset/tuần, đổi pillar luân phiên để không nhàm.
      Bắt buộc có compliance_notes trong brief nếu là ngành có quy định (tài chính, y tế,
      giáo dục) — mọi con số ưu đãi phải kèm điều kiện và thời hạn.
    asset_pattern:
      - { offset_days: 0, format: fb_post, platform: facebook, funnel_stage: discovery,  function_role: gioi_thieu,   cta_type: link_click }
      - { offset_days: 3, format: fb_reel, platform: facebook, funnel_stage: engagement, function_role: minh_hoa,     cta_type: link_click }

  # ────────────────────────────────────────────────────────────────────────
  hot_news:
    name: "Phản ứng tin nóng"
    when: >
      Có sự kiện vừa xảy ra, cần nói trong 24–72h. Mục tiêu là discovery và uy tín chủ đề.
    duration_days: 3
    cycle_days: 3
    cycles: 1
    hero_format: short
    default_primary_kpi: impressions
    default_secondary_kpi: engaged_views
    default_guardrail_kpi: ctr
    commercial_cta_cycles: []         # tin nóng KHÔNG bán hàng
    notes: >
      Luật quan trọng nhất: KHÔNG cố làm video dài chỉ vì tin đang hot. Short + post trước;
      video dài chỉ làm sau khi đã đủ dữ liệu và có góc nhìn riêng.
      HRS ≥ 3 là chuyện thường ở loại này — bắt buộc gắn nhãn "chưa được kiểm chứng đầy đủ"
      và chờ nguồn sơ cấp trước khi khẳng định.
    asset_pattern:
      - { offset_days: 0, format: short,   platform: youtube,  funnel_stage: discovery,  function_role: so_what,     cta_type: subscribe, distribution_platforms: "youtube;facebook", is_hero: true }
      - { offset_days: 0, format: fb_post, platform: facebook, funnel_stage: discovery,  function_role: goc_nhin,    cta_type: comment }
      - { offset_days: 2, format: fb_post, platform: facebook, funnel_stage: engagement, function_role: cap_nhat,    cta_type: comment }

  # ────────────────────────────────────────────────────────────────────────
  evergreen:
    name: "Nội dung sống lâu"
    when: >
      Chủ đề không phụ thuộc thời điểm, người ta sẽ tìm kiếm trong nhiều tháng.
      Mục tiêu là tìm-thấy-được và giữ chân, không phải bùng nổ ngày đầu.
    duration_days: 14
    cycle_days: 14
    cycles: 1
    hero_format: long_video
    default_primary_kpi: avg_percentage_viewed
    default_secondary_kpi: returning_viewers
    default_guardrail_kpi: retention_30s
    commercial_cta_cycles: []
    notes: >
      Nhiều cửa vào cho cùng một nội dung: mỗi asset nhắm một truy vấn/nỗi đau khác nhau,
      tất cả dẫn về hero. Đừng đo bằng số liệu 7 ngày — loại này ăn ở đường dài,
      đánh giá tại mốc 28 ngày và rà lại sau 90 ngày.
    asset_pattern:
      - { offset_days: 0,  format: long_video,   platform: youtube,  funnel_stage: consumption, function_role: huong_dan_day_du, cta_type: subscribe, is_hero: true }
      - { offset_days: 2,  format: short,        platform: youtube,  funnel_stage: discovery,   function_role: cua_vao_1,        cta_type: subscribe, distribution_platforms: "youtube;facebook" }
      - { offset_days: 5,  format: fb_post,      platform: facebook, funnel_stage: discovery,   function_role: cua_vao_2,        cta_type: comment }
      - { offset_days: 9,  format: short,        platform: youtube,  funnel_stage: discovery,   function_role: cua_vao_3,        cta_type: subscribe, distribution_platforms: "youtube;facebook" }
      - { offset_days: 13, format: yt_community, platform: youtube,  funnel_stage: engagement,  function_role: hoi_vuong_mac,    cta_type: poll_vote }

## Quy ước mã asset do new_campaign.py sinh:
##   {BRAND}-{CAMPAIGN}-C{chu kỳ}-{LOẠI}{số trong chu kỳ}
##   vd DNA-C01-C1-HERO · DNA-C01-C1-SHORT2 · DNA-C01-C3-FB1
## Mã ổn định: chèn/xoá asset khác KHÔNG làm đổi mã của asset cũ.
