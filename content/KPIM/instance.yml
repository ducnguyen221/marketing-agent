## instance.yml — bộ mẫu DEMO đi kèm repo
##
## Đây là instance ví dụ để minh hoạ trọn quy trình. Dữ liệu mô phỏng, KHÔNG nối API thật,
## KHÔNG PII, KHÔNG credential. Cài instance riêng của bạn: chạy install.ps1.
name: KPIM
label: "Bộ mẫu — quy trình content đa kênh (KPIM Academy / COMPA Class)"
autonomy: suggest          # suggest | auto_safe | full — demo luôn 'suggest', không đăng thật
language: vi
timezone: Asia/Ho_Chi_Minh

## Bộ pillar của instance (CAMPAIGN_TEMPLATE Mục 6). Đây là pillar MẪU — instance riêng
## thay bằng trụ nội dung của bạn.
pillars: [Power BI, Fabric, AI Agent, Career]

## Kênh phân phối. page_id/channel_id để trống vì bộ mẫu không nối API.
## Cách lấy token + quyền: agent/knowledge/PLATFORM_SETUP.md
channels:
  - platform: facebook
    handle: "Tobi Nguyễn"
    page_id: ""
    token_env: ""          # tên biến trong .env, vd FB_PAGE_TOKEN__<INSTANCE>
  - platform: youtube
    handle: "Học cùng Tobi"
    channel_id: ""
    token_env: ""

note: >
  Bộ mẫu chạy đầy đủ một chiến dịch ở 02_campaigns/01_Tobi_Posts (hồ sơ .md + workbook
